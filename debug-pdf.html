<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 转换调试工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1, h2, h3 {
            color: #667eea;
        }
        textarea {
            width: 100%;
            min-height: 300px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            background: #f0f2ff;
        }
        #fileInput {
            display: none;
        }
        .page-info {
            background: #f8f9ff;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            border-left: 4px solid #667eea;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-item {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .format-selector {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
        }
        .format-options {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        .format-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .format-option input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>PDF 转换调试工具</h1>
    <p>用于分析 pdf.js 提取的文本内容，优化 PDF 转换逻辑</p>

    <div class="card">
        <div class="upload-area" id="uploadArea">
            <div style="font-size: 48px;">📄</div>
            <div>点击或拖拽 PDF 文档到此处</div>
        </div>
        <input type="file" id="fileInput" accept=".pdf">
    </div>

    <div class="card" id="statsCard" style="display: none;">
        <h2>PDF 统计信息</h2>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="pageCount">0</div>
                <div class="stat-label">总页数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="charCount">0</div>
                <div class="stat-label">总字符数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="wordCount">0</div>
                <div class="stat-label">总词数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="lineCount">0</div>
                <div class="stat-label">总行数</div>
            </div>
        </div>
    </div>

    <div class="card" id="pagesCard" style="display: none;">
        <h2>页面内容分析</h2>
        <div id="pagesAnalysis"></div>
    </div>

    <div class="card" id="rawTextCard" style="display: none;">
        <h2>原始文本输出（pdf.js 提取）</h2>
        <textarea id="rawTextOutput" readonly placeholder="上传 PDF 后将显示原始提取的文本..."></textarea>
        <button class="btn" onclick="copyRawText()">复制原始文本</button>
    </div>

    <div class="card" id="convertedCard" style="display: none;">
        <h2>转换后的输出</h2>
        <div class="format-selector">
            <label>选择输出格式：</label>
            <div class="format-options">
                <label class="format-option">
                    <input type="radio" name="outputFormat" value="markdown" checked>
                    <span>Markdown (.md)</span>
                </label>
                <label class="format-option">
                    <input type="radio" name="outputFormat" value="txt">
                    <span>TXT (.txt)</span>
                </label>
                <label class="format-option">
                    <input type="radio" name="outputFormat" value="json">
                    <span>JSON (.json)</span>
                </label>
            </div>
        </div>
        <textarea id="convertedOutput" readonly placeholder="转换后的内容将显示在这里..."></textarea>
        <button class="btn" onclick="copyConverted()">复制转换结果</button>
        <button class="btn" onclick="downloadConverted()">下载文件</button>
    </div>

    <script>
        // 设置 PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const statsCard = document.getElementById('statsCard');
        const pagesCard = document.getElementById('pagesCard');
        const rawTextCard = document.getElementById('rawTextCard');
        const convertedCard = document.getElementById('convertedCard');
        const pagesAnalysis = document.getElementById('pagesAnalysis');
        const rawTextOutput = document.getElementById('rawTextOutput');
        const convertedOutput = document.getElementById('convertedOutput');

        let pdfContent = null;

        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#e8ebff';
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = '';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = '';
            const files = Array.from(e.dataTransfer.files);
            if (files.length > 0 && files[0].type === 'application/pdf') {
                handleFile(files[0]);
            } else {
                alert('请上传 PDF 文件');
            }
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        async function handleFile(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            
            pdfContent = {
                title: file.name,
                pages: []
            };

            let allText = '';
            let totalChars = 0;
            let totalWords = 0;
            let totalLines = 0;

            // 分析每一页
            let analysisHtml = '';
            
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                
                let pageText = '';
                let lastY = null;
                let lineCount = 0;
                
                textContent.items.forEach(item => {
                    if (lastY !== null && Math.abs(item.transform[5] - lastY) > 5) {
                        pageText += '\n';
                        lineCount++;
                    }
                    pageText += item.str;
                    lastY = item.transform[5];
                });

                const trimmedText = pageText.trim();
                const words = trimmedText.split(/\s+/).filter(w => w.length > 0);
                
                pdfContent.pages.push({
                    pageNumber: i,
                    text: trimmedText,
                    lineCount: lineCount,
                    charCount: trimmedText.length,
                    wordCount: words.length
                });

                allText += `--- 第 ${i} 页 ---\n\n${trimmedText}\n\n`;
                totalChars += trimmedText.length;
                totalWords += words.length;
                totalLines += lineCount;

                // 页面分析
                analysisHtml += `
                    <div class="page-info">
                        <h3>第 ${i} 页</h3>
                        <p><strong>字符数：</strong>${trimmedText.length}</p>
                        <p><strong>词数：</strong>${words.length}</p>
                        <p><strong>行数：</strong>${lineCount}</p>
                        <details>
                            <summary>查看文本内容</summary>
                            <pre style="white-space: pre-wrap; word-wrap: break-word; background: #f0f2ff; padding: 10px; border-radius: 4px; margin-top: 10px;">${escapeHtml(trimmedText.substring(0, 500))}${trimmedText.length > 500 ? '...' : ''}</pre>
                        </details>
                    </div>
                `;
            }

            // 显示统计信息
            document.getElementById('pageCount').textContent = pdf.numPages;
            document.getElementById('charCount').textContent = totalChars.toLocaleString();
            document.getElementById('wordCount').textContent = totalWords.toLocaleString();
            document.getElementById('lineCount').textContent = totalLines.toLocaleString();

            // 显示各部分
            statsCard.style.display = 'block';
            pagesCard.style.display = 'block';
            rawTextCard.style.display = 'block';
            convertedCard.style.display = 'block';

            pagesAnalysis.innerHTML = analysisHtml;
            rawTextOutput.value = allText;

            // 转换输出
            updateConvertedOutput();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateConvertedOutput() {
            if (!pdfContent) return;

            const format = document.querySelector('input[name="outputFormat"]:checked').value;
            let output = '';

            if (format === 'markdown') {
                output = `# ${pdfContent.title}\n\n`;
                pdfContent.pages.forEach(page => {
                    output += `## 第 ${page.pageNumber} 页\n\n`;
                    output += page.text + '\n\n';
                });
            } else if (format === 'txt') {
                output = `${pdfContent.title}\n\n`;
                pdfContent.pages.forEach(page => {
                    output += `--- 第 ${page.pageNumber} 页 ---\n\n`;
                    output += page.text + '\n\n';
                });
            } else if (format === 'json') {
                output = JSON.stringify(pdfContent, null, 2);
            }

            convertedOutput.value = output;
        }

        // 监听格式变化
        document.querySelectorAll('input[name="outputFormat"]').forEach(radio => {
            radio.addEventListener('change', updateConvertedOutput);
        });

        function copyRawText() {
            rawTextOutput.select();
            document.execCommand('copy');
            alert('原始文本已复制到剪贴板！');
        }

        function copyConverted() {
            convertedOutput.select();
            document.execCommand('copy');
            alert('转换结果已复制到剪贴板！');
        }

        function downloadConverted() {
            if (!pdfContent) return;

            const format = document.querySelector('input[name="outputFormat"]:checked').value;
            const ext = format === 'markdown' ? 'md' : format;
            const filename = pdfContent.title.replace('.pdf', '') + '.' + ext;
            
            const blob = new Blob([convertedOutput.value], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            link.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
